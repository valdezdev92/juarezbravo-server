name: News Scraper

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Prevent two scraper runs from overlapping
concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write   # needed to commit processed.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back cleanly
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install scraper dependencies
        working-directory: scripts
        run: npm install

      - name: Run scraper
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: node scraper.mjs

      - name: Commit updated processed list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/processed.json
          # Only commit if processed.json actually changed
          if git diff --staged --quiet; then
            echo "No changes to processed.json"
          else
            git commit -m "chore: update processed articles [skip ci]"
            git push
          fi
