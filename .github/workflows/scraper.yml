name: News Scraper (primary)

# Scraper PRIMARIO. Corre cada 20 min (:00, :20, :40 UTC) — es la fuente
# normal de scraping. Tras correr, reporta al server via /api/scraper/heartbeat
# para que el fallback in-process del server sepa que ya hubo un run reciente
# y se salte su slot.
#
# El scraper in-process del server actúa como FALLBACK: corre cada 20 min
# desfasado (:10, :30, :50 UTC), y solo se ejecuta si no hubo un heartbeat
# en los últimos 25 min.

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install scraper dependencies
        working-directory: scripts
        run: npm install

      - name: Run scraper
        id: scrape
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: node scraper.mjs

      - name: Report run to server heartbeat
        if: always()
        env:
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPE_OUTCOME: ${{ steps.scrape.outcome }}
        run: |
          # Slot redondeado al múltiplo de 20 min más reciente (UTC).
          SCHEDULED_AT=$(python3 -c "
          import datetime
          n = datetime.datetime.utcnow().replace(second=0, microsecond=0)
          n = n.replace(minute=n.minute - (n.minute % 20))
          print(n.strftime('%Y-%m-%d %H:%M:%S'))
          ")
          STATUS="success"
          if [ "$SCRAPE_OUTCOME" != "success" ]; then STATUS="error"; fi

          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
            'scheduled_at': '${SCHEDULED_AT}',
            'status':       '${STATUS}',
          }))
          ")

          curl -sS -m 15 -X POST \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${SCRAPER_API_KEY}" \
            -d "${PAYLOAD}" \
            "${API_URL}/api/scraper/heartbeat" || \
            echo "Heartbeat falló (no bloqueante)"

      - name: Commit updated processed list
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/processed.json
          if git diff --staged --quiet; then
            echo "No changes to processed.json"
          else
            git commit -m "chore: update processed articles [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
