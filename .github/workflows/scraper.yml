name: News Scraper (fallback)

# Este workflow es el FALLBACK del scraper que corre dentro del server.
# Antes de scrapear, consulta /api/scraper/status:
#   - Si el server scrapeó con éxito hace menos de FALLBACK_THRESHOLD_MIN minutos
#     → salta (server está sano)
#   - Si no hay respuesta o el último run fue hace más tiempo
#     → asume server caído y corre como respaldo

on:
  schedule:
    # Cada 30 min — corre con menor frecuencia que el server (cada 20 min)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar ejecución aunque el server scrape esté sano'
        required: false
        default: 'false'

concurrency:
  group: scraper
  cancel-in-progress: false

env:
  FALLBACK_THRESHOLD_MIN: 35

jobs:
  scrape:
    name: Scrape & Publish (fallback)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write

    steps:
      - name: Check server scraper health
        id: health
        run: |
          API_URL="${{ secrets.API_URL }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ "$FORCE" = "true" ]; then
            echo "Manual run con force=true — saltándose el health check"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATUS_JSON=$(curl -sfm 10 "${API_URL}/api/scraper/status" || echo '')
          if [ -z "$STATUS_JSON" ]; then
            echo "No se pudo contactar al server — corriendo como fallback"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LAST_MIN=$(echo "$STATUS_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); v=d.get('last_success_minutes_ago'); print(v if v is not None else 9999)")
          echo "Server scrape exitoso hace ${LAST_MIN} min (threshold: ${FALLBACK_THRESHOLD_MIN})"

          if [ "${LAST_MIN}" -lt "${FALLBACK_THRESHOLD_MIN}" ]; then
            echo "Server scrape está sano — saltando este run"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Server scrape stale — corriendo como fallback"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.health.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        if: steps.health.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install scraper dependencies
        if: steps.health.outputs.should_run == 'true'
        working-directory: scripts
        run: npm install

      - name: Run scraper
        if: steps.health.outputs.should_run == 'true'
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: node scraper.mjs

      - name: Commit updated processed list
        if: steps.health.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/processed.json
          if git diff --staged --quiet; then
            echo "No changes to processed.json"
          else
            git commit -m "chore: update processed articles [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
